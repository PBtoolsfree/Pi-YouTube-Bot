<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body {
            background-color: transparent; /* OBS Transparency */
            font-family: 'Rajdhani', sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        .leaderboard-container {
            width: 350px;
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid #7B2CBF;
            border-radius: 12px;
            box-shadow: 0 0 15px #7B2CBF, inset 0 0 20px rgba(123, 44, 191, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px;
            animation: glow 4s infinite alternate;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin: 0 0 15px 0;
            color: #E0AAFF;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #3C096C;
            padding-bottom: 10px;
            font-size: 1.4rem;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: rgba(60, 9, 108, 0.3);
            border-left: 3px solid #9D4EDD;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .list-item:nth-child(1) { border-left-color: #FFD700; background: rgba(255, 215, 0, 0.15); }
        .list-item:nth-child(2) { border-left-color: #C0C0C0; background: rgba(192, 192, 192, 0.15); }
        .list-item:nth-child(3) { border-left-color: #CD7F32; background: rgba(205, 127, 50, 0.15); }

        .rank {
            font-weight: bold;
            font-size: 1.1rem;
            width: 30px;
            color: #9D4EDD;
        }
        .list-item:nth-child(1) .rank { color: #FFD700; }
        .list-item:nth-child(2) .rank { color: #C0C0C0; }
        .list-item:nth-child(3) .rank { color: #CD7F32; }

        .name {
            flex-grow: 1;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .points {
            font-family: 'Orbitron', sans-serif;
            color: #E0AAFF;
            font-size: 0.95rem;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #7B2CBF; }
            to { box-shadow: 0 0 20px #9D4EDD, 0 0 10px #E0AAFF; }
        }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <h2>Top Loyalists</h2>
        <ul class="list" id="leaderboard">
            <!-- Items injected here -->
            <li class="list-item" style="justify-content:center; opacity:0.7;">Loading...</li>
        </ul>
    </div>

    <script>
        const API_URL = '/api/loyalty/leaderboard';
        
        async function fetchLeaderboard() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                render(data);
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function render(users) {
            const list = document.getElementById('leaderboard');
            list.innerHTML = '';
            
            // Show Top 5
            const topUsers = users.slice(0, 8); 

            topUsers.forEach((user, index) => {
                const li = document.createElement('li');
                li.className = 'list-item';
                
                li.innerHTML = `
                    <span class="rank">#${index + 1}</span>
                    <span class="name">${user.name}</span>
                    <span class="points">${user.points.toLocaleString()}</span>
                `;
                list.appendChild(li);
            });
        }

        // Poll every 10 seconds
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 10000);
    </script>
</body>
</html>
