version: '3.8'

services:
  pibot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-youtube-bot
    restart: always
    ports:
      - "8000:8000"
      - "1234:1234/udp"
      - "1235:1235/udp"
    volumes:
      # Config and secrets (edit these on the host)
      - ./config.json:/app/config.json:rw
      - ./.env:/app/.env:ro
      # Persistent data
      - ./data:/app/data:rw
      - ./logs:/app/logs:rw
      # Google OAuth credentials (if used)
      - ./client_secret.json:/app/client_secret.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
